<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
</head>
<body>

<h1>Todo List</h1>

<a href="{% url 'task-create' %}">Add task</a>

<ul>
    {% for task in task_list %}
        <li>
            {{ task.content }} -
            {% if task.is_done %}
                Status: Done
            {% else %}
                Status: Not done
            {% endif %}
        </li>
    {% empty %}
        <li>No tasks yet</li>
    {% endfor %}
</ul>

</body>
</html>
