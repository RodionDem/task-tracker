{% extends "base.html" %}

{% block title %}Delete Tag{% endblock %}

{% block content %}
<h1>Delete Tag</h1>
<p>Are you sure you want to delete "{{ object.name }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="button" style="background-color:#e74c3c">Yes, delete</button>
    <a href="{% url 'tag-list' %}" class="button">Cancel</a>
</form>
{% endblock %}
